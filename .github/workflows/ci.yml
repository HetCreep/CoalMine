name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'profile/**'
      - '.github/profile/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'profile/**'
      - '.github/profile/**'

permissions:
  contents: read

jobs:
  gate:
    name: gate (${{ matrix.os }} · node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22, 24]  # supported LTS only (24 Active, 22 Maintenance); 18/20 are EOL — bump as the Node LTS schedule moves
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
      # Zero-dependency: no install. scripts/test.mjs is the single guarded node-test
      # gate (existsSync precheck + orphan check + fail-loud) — a missing/renamed test
      # can no longer silently drop from the run (on Node 24 a missing arg alongside a
      # present one greens as a zero-match filter). The runner's TESTS list is the
      # source of truth the local hooks also mirror.
      - run: node scripts/verify.mjs
      - run: node scripts/test.mjs
      # PowerShell parity tests (the PS twins of the Node hooks) — pwsh ships on the GitHub
      # runners; skip gracefully if it is ever absent so the node gate above still gates.
      - name: PowerShell parity tests
        shell: bash
        run: |
          if command -v pwsh >/dev/null 2>&1; then
            pwsh -NoProfile -File scripts/lib/ps-config.test.ps1
            pwsh -NoProfile -File scripts/lib/ps-hooks.test.ps1
          else
            echo "pwsh not found — skipping PS parity tests"
          fi
