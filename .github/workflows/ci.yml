name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'profile/**'
      - '.github/profile/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'profile/**'
      - '.github/profile/**'

permissions:
  contents: read

jobs:
  gate:
    name: gate (${{ matrix.os }} · node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22, 24]  # supported LTS only (24 Active, 22 Maintenance); 18/20 are EOL — bump as the Node LTS schedule moves
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
      # Zero-dependency: no install. Same fail-loud gate as the local hooks, cross-platform.
      - run: node scripts/verify.mjs
      - run: node --test scripts/lib/regions.test.mjs scripts/lib/render.test.mjs scripts/lib/configure.test.mjs scripts/lib/install.test.mjs scripts/lib/consistency.test.mjs scripts/lib/hooks.test.mjs
