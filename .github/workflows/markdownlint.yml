name: markdownlint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        continue-on-error: true  # report-only: this is a doc-heavy repo; a focused markdownlint cleanup (bare URLs, malformed tables) is a separate pass
        with:
          globs: '**/*.md'
